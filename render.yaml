services:
  # 1. This defines your Web Service (the Django app)
  - type: web
    name: my-django-app
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn my_project_name.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4

# 2. This defines your Database (PostgreSQL)
databases:
  - name: my-database
    plan: free